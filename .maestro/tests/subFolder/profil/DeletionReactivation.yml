appId: ${MAESTRO_APP_ID}
---
- tapOn: ${output.wording.profil.deletion.personalInfo}

- assertVisible: ${output.wording.profil.deletion.fullName}
- assertVisible: ${output.wording.profil.deletion.email}
- assertVisible: ${output.wording.profil.deletion.phone}
- assertVisible: ${output.wording.profil.deletion.password}
- runFlow:
    when:
        platform: android
    commands:
    - tapOn: ${output.wording.profil.deletion.deleteAccount}
- repeat:
    while:
      notVisible: ${output.wording.profil.deletion.deleteReasonQuestion}
    commands:
    - doubleTapOn: ${output.wording.profil.deletion.deleteAccount}
- assertVisible: ${output.wording.profil.deletion.deleteReasonQuestion}

- tapOn: ${output.wording.profil.deletion.reasonDifferentEmail}

- assertVisible: ${output.wording.profil.deletion.modifyEmailInfo}
- tapOn: ${output.wording.profil.deletion.iUnderstand}
- assertVisible: ${output.wording.profil.deletion.modifyEmail}
- assertVisible: ${output.wording.profil.deletion.validateModifyEmail}
- tapOn: ${output.wording.common.backButton}

- tapOn: ${output.wording.profil.deletion.noLongerUseApp}
- runFlow: ./DeletionNotAllowed.yml

- tapOn: ${output.wording.profil.deletion.noCredit}
- runFlow: ./DeletionNotAllowed.yml

- tapOn: ${output.wording.profil.deletion.deletePersonalData}
- runFlow: ./DeletionNotAllowed.yml

- scrollUntilVisible:
    element: ${output.wording.profil.deletion.other}

- tapOn: ${output.wording.profil.deletion.someoneElseAccess}
- assertVisible: ${output.wording.profil.deletion.secureAccount}
- assertVisible: ${output.wording.profil.deletion.suspendAccount}
- assertVisible: ${output.wording.profil.deletion.dontSecureAccount}
- tapOn: ${output.wording.common.backButton}
- scrollUntilVisible: 
    element: ${output.wording.profil.deletion.other}

- tapOn: ${output.wording.profil.deletion.other}
- assertVisible: ${output.wording.profil.deletion.contactSupport}
- assertVisible: ${output.wording.profil.deletion.contactSupportButton}
- tapOn: ${output.wording.profil.deletion.backToProfile}
