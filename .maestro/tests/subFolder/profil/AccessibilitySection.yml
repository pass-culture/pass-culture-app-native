appId: ${MAESTRO_APP_ID}
---
- scrollUntilVisible:
    element:
      text: ${output.wording.profil.confidentiality.title}
- tapOn: ${output.wording.profil.accessibility.title}
- assertVisible: ${output.wording.profil.accessibility.title}

- tapOn: ${output.wording.profil.accessibility.sitemap}
- assertVisible: ${output.wording.profil.accessibility.sitemap}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn:
    text: ${output.wording.profil.accessibility.commitments}
    index: 0
- assertVisible: ${output.wording.profil.accessibility.title}
- assertVisible: ${output.wording.profil.accessibility.passAccessibility}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn: ${output.wording.profil.accessibility.multiannualScheme}
- assertVisible: ${output.wording.profil.accessibility.multiannualSchemeTitle}
- assertVisible: ${output.wording.profil.accessibility.introduction}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn: ${output.wording.profil.accessibility.declarationAndroid}
- assertVisible: ${output.wording.profil.accessibility.declarationAndroid}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn: ${output.wording.profil.accessibility.declarationIos}
- assertVisible: ${output.wording.profil.accessibility.declarationIos}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn: ${output.wording.profil.accessibility.declarationWeb}
- assertVisible: ${output.wording.profil.accessibility.declarationWebTitle}
- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- tapOn: ${output.wording.profil.accessibility.recommendedPathsWeb}
- assertVisible: ${output.wording.profil.accessibility.recommendedPathsWebTitle}

- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml

- runFlow:
    file: ../../subFolder/cloud/commands/TapOnBack.yml
