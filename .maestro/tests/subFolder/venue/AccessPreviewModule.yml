appId: ${MAESTRO_APP_ID}
---
- extractTextWithAI:
    query: "Le titre exacte d'une des offres Livre visible dans les résultats de recherche"
    outputVariable: 'offerResult'
- tapOn: .*${offerResult}.*

- runFlow:
    when:
      platform: Android
    commands:
    - tapOn:
        id: offerBodyImage

- runFlow:
    when:
      platform: iOS
    commands:
    - tapOn: ${output.wording.venue.illustration}

- runFlow:
    when:
      visible: ${output.wording.venue.illustration1of2}
    commands:
      - assertVisible:
          text: ${output.wording.venue.illustration1of2}
      - swipe:
          direction: LEFT
      - assertVisible:
          text: ${output.wording.venue.illustration2of2}
      - swipe:
          direction: RIGHT

- runFlow:
    when:
      notVisible: ${output.wording.venue.illustration1of2}
    commands:
      - assertVisible:
          text: ${output.wording.venue.illustration1of1}

- tapOn: ${output.wording.common.backButton}
- tapOn: ${output.wording.common.backButton}
