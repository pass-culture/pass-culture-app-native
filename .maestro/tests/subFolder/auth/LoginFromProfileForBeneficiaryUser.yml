appId: ${MAESTRO_APP_ID}
---
- assertVisible: ${output.wording.profil.tabBar.profil}
- tapOn: ${output.wording.auth.login.button}

- assertVisible: ${output.wording.auth.login.title}
- tapOn:
    id: ${output.wording.auth.login.emailId}
- runFlow: InputEmail.yml
- tapOn:
    id: ${output.wording.auth.login.passwordId}
- inputText: ${MAESTRO_PASSWORD}
- runFlow:
    when:
      platform: Android
    commands:
    - hideKeyboard
- runFlow:
    when:
      platform: iOS
    commands:
    - tapOn: ${output.wording.auth.login.title} # Pour fermer le clavier iOS

- tapOn:
    text: ${output.wording.auth.login.button} # Android
    retryTapIfNoChange: true

- waitForAnimationToEnd

- runFlow: # Si apparition de l'écran de crédit (félicitations 18 ans)
    when:
      visible: ${output.wording.auth.modal.activationNews}
    commands:
      - tapOn: ${output.wording.auth.modal.continue}

- runFlow: # Si apparition de la modale de suivi des thèmes
    when:
      visible: ${output.wording.auth.modal.noThanks}
    commands:
      - tapOn: ${output.wording.auth.modal.noThanks}

- runFlow: # Si apparition du QPI
    when:
      visible: ${output.wording.auth.modal.takeMinute}
    commands:
      - tapOn: ${output.wording.auth.modal.later}

- waitForAnimationToEnd

- runFlow: # Si apparition de la modale de partage
    when:
      visible: ${output.wording.auth.modal.share}
    commands:
      - tapOn: ${output.wording.auth.modal.noThanks}

- runFlow: # Si apparition de la modale native iOS de sauvegarde du mot de passe
    when:
      visible: ${output.wording.auth.modal.later}
    commands:
      - tapOn: ${output.wording.auth.modal.later}
