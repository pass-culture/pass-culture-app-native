appId: ${MAESTRO_APP_ID}
---
- tapOn: ${output.wording.auth.login.button}

- assertVisible: ${output.wording.auth.login.title}
- tapOn:
    id: ${output.wording.auth.login.showPasswordId}
- tapOn:
    id: ${output.wording.auth.login.emailId}
- inputRandomEmail
- tapOn:
    id: ${output.wording.auth.login.passwordId}
- inputText: ${MAESTRO_PASSWORD}
- runFlow:
    when:
      platform: Android
    commands:
    - hideKeyboard
- runFlow:
    when:
      platform: iOS
    commands:
    - tapOn: ${output.wording.auth.login.title} # Pour fermer le clavier iOS
- tapOn: ${output.wording.auth.login.button} # Android
- assertVisible: ${output.wording.auth.login.wrongCredentialsError}

- tapOn: ${output.wording.common.backButton} # Permet de réinitialiser les forms

- runFlow:
    when:
      visible: ${output.wording.common.later}
    commands:
      - tapOn: ${output.wording.common.later}
