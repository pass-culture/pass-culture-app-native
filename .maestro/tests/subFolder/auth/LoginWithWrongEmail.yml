appId: ${MAESTRO_APP_ID}
---
- tapOn: 'Se connecter'
- tapOn: 'Continuer avec mon e-mail'

- assertVisible: 'Connecte-toi'
- tapOn:
    id: 'Afficher le mot de passe'
- tapOn: 'Continuer avec mon e-mail'
- tapOn:
    id: 'Entrée pour l’email'
- inputRandomEmail
- tapOn:
    id: 'Mot de passe'
- inputText: ${MAESTRO_PASSWORD}
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: 'Connecte-toi' # Pour fermer le clavier iOS
- tapOn: 'Se connecter' # Android
- assertVisible: '.*E-mail ou mot de passe incorrect.*'

- tapOn: 'Revenir en arrière' # Permet de réinitialiser les forms

- runFlow:
    when:
      visible: 'Plus tard'
    commands:
      - tapOn: 'Plus tard'
