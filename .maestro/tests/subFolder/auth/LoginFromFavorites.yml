appId: ${MAESTRO_APP_ID}
---
- tapOn: ${output.wording.auth.login.button}

- runFlow:
    when:
      visible: ${output.wording.auth.signup.title}
    commands:
      - pressKey: back

- tapOn:
    id: ${output.wording.auth.login.emailId}
- runFlow: InputEmail.yml
- tapOn:
    id: ${output.wording.auth.login.passwordId}
- inputText: ${MAESTRO_PASSWORD}
- runFlow:
    when:
      platform: Android
    commands:
    - hideKeyboard
- runFlow:
    when:
      platform: iOS
    commands:
    - tapOn: ${output.wording.auth.login.title} # Pour fermer le clavier iOS
- tapOn: ${output.wording.auth.login.button}

- waitForAnimationToEnd

- runFlow: # Si apparition de l'écran de crédit (félicitations 18 ans)
    when:
      visible: ${output.wording.auth.modal.activationNews}
    commands:
      - tapOn: ${output.wording.auth.modal.continue}

- runFlow:
    when:
      visible: ${output.wording.auth.modal.later}
    commands:
      - tapOn: ${output.wording.auth.modal.later}

- runFlow: # Si apparition de la modale de partage
    when:
      visible: ${output.wording.auth.modal.share}
    commands:
      - tapOn: ${output.wording.auth.modal.noThanks}
