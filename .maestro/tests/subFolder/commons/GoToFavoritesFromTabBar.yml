appId: ${MAESTRO_APP_ID}
---
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: ${output.wording.favorite.tabBar}

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: ${output.wording.favorite.tabBar}

- runFlow:
    when:
      platform: Web
    commands:
      - tapOn: 'Favoris'
