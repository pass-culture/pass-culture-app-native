appId: ${MAESTRO_APP_ID}
---
- assertVisible:
    id: ${output.wording.favorite.sortButton}
- tapOn:
    id: ${output.wording.favorite.sortButton}

- assertVisible: ${output.wording.favorite.sortTitle}
- assertVisible: ${output.wording.favorite.sortRecentlyAdded}
- assertVisible: ${output.wording.favorite.sortPriceAsc}
- assertVisible: ${output.wording.favorite.sortProximity}

- tapOn: ${output.wording.favorite.sortPriceAsc}
- tapOn: ${output.wording.favorite.validate}

- assertVisible: ${output.wording.favorite.count}
- tapOn:
    id: ${output.wording.favorite.sortButton}

- tapOn: ${output.wording.favorite.sortProximity}

- runFlow:
    when:
      visible: ${output.wording.favorite.location.activate}
    commands:
    - tapOn: ${output.wording.favorite.location.activate}
    - tapOn: ${output.wording.favorite.location.permissions}
    - tapOn: ${output.wording.favorite.location.position}
    - tapOn: ${output.wording.favorite.location.allowWhileUsing}
    - pressKey: back
    - pressKey: back
    - pressKey: back

- tapOn: ${output.wording.favorite.sortProximity}
- tapOn: ${output.wording.favorite.validate}

- assertVisible: ${output.wording.favorite.count}
- tapOn:
    id: ${output.wording.favorite.sortButton}

- tapOn: ${output.wording.favorite.sortRecentlyAdded}
- tapOn: ${output.wording.favorite.validate}
- assertVisible: ${output.wording.favorite.count}