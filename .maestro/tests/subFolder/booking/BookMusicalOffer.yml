appId: ${MAESTRO_APP_ID}
---
- assertVisible: ${output.wording.search.title}
- runFlow:
    when:
      visible: ${output.wording.search.myPosition}
    commands:
      - tapOn: ${output.wording.search.myPosition}
      - tapOn: ${output.wording.search.franceEntire}

- runFlow:
    label: 'Swipe vers les offres pour éviter tap sur la tabBar'
    when:
      platform: iOS
    commands:
      - swipe:
          start: 50%, 49%
          end: 50%, 37%

- runFlow:
    label: 'Swipe vers les offres pour éviter tap sur la tabBar'
    when:
      platform: Android
    commands:
      - swipe:
          from:
            text: ${output.wording.search.offersTitle}
          direction: UP

- tapOn: ${output.wording.search.cdType}

- runFlow:
    when:
      visible: ${output.wording.booking.viewBooking}
    commands:
      - tapOn: ${output.wording.booking.viewBooking}
      - scrollUntilVisible:
          element: ${output.wording.booking.cancel}
      - tapOn: ${output.wording.booking.cancel} # TODO(PC-36108) améliorer les perfs pour éviter de devoir cliquer deux fois sur ce bouton
      - tapOn: ${output.wording.booking.cancel}

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: ${output.wording.booking.stickyButtonId}
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: ${output.wording.booking.button}

- assertVisible: ${output.wording.booking.detailsTitle}
- tapOn: ${output.wording.booking.termsId}
- runFlow:
    when:
      platform: Android
    commands:
      - scrollUntilVisible:
          element: ${output.wording.booking.confirm}
- runFlow:
    when:
      platform: iOS
    commands:
      - scroll
- doubleTapOn: ${output.wording.booking.confirm}

- assertVisible: ${output.wording.booking.confirmed}
- tapOn: ${output.wording.booking.viewBooking}

- runFlow:
    when:
      platform: iOS
      visible: ${output.wording.common.later}
    commands:
      - tapOn: ${output.wording.common.later}

- scrollUntilVisible:
    element: ${output.wording.booking.cancel}
- tapOn: ${output.wording.booking.cancel}
- tapOn: ${output.wording.booking.cancel}
