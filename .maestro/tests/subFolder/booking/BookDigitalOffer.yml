appId: ${MAESTRO_APP_ID}
---
- assertVisible: ${output.wording.search.title}
- swipe:
    from:
      text: ${output.wording.search.offersTitle}
    direction: UP
- tapOn:
    text: ${output.wording.search.digitalSubscription}
    index: 2

- runFlow:
    when:
      visible: ${output.wording.booking.button}
    commands:
      - tapOn: ${output.wording.booking.button}

- runFlow:
    when:
      visible: ${output.wording.booking.onlineAccess}
    commands:
      - assertVisible: ${output.wording.booking.onlineAccess}

- runFlow:
    when:
      visible: ${output.wording.booking.almostThere}
    commands:
      - assertVisible: ${output.wording.booking.almostThere}
