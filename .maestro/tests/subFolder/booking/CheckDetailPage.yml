appId: ${MAESTRO_APP_ID}
---
- assertVisible: ${output.wording.search.title}
- runFlow:
    when:
      visible: ${output.wording.search.myPosition}
    commands:
      - tapOn: ${output.wording.search.myPosition}
      - tapOn: ${output.wording.search.franceEntire}

- swipe:
    from:
      text: ${output.wording.search.offersTitle}
    direction: UP
- tapOn:
    text: ${output.wording.search.cdType}
    index: 2

- waitForAnimationToEnd

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: ${output.wording.booking.stickyButtonId}
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: ${output.wording.booking.stickyButtonId}

- assertVisible: ${output.wording.booking.detailsTitle}
- assertVisible: ${output.wording.booking.info}
- assertVisible: ${output.wording.booking.location}
- assertVisible: ${output.wording.booking.cancelConditions}
- assertVisible: ${output.wording.booking.useConditions}
- assertVisible: ${output.wording.booking.generalConditions}

- tapOn: ${output.wording.booking.closeModal}
