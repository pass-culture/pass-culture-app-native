appId: ${MAESTRO_APP_ID}
---
- assertVisible: ${output.wording.search.title}
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: ${output.wording.search.bookType}
          index: 0

- runFlow:
    when:
      platform: iOS
    commands:
      - extractTextWithAI:
          query: "Le titre exacte d'une des offres Livre visible dans les résultats de recherche"
          outputVariable: 'offerResult'
      - tapOn: .*${offerResult}.*

- waitForAnimationToEnd

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: ${output.wording.booking.button}

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: ${output.button.ios.booking}

- assertVisible: ${output.wording.booking.detailsTitle}
- tapOn: ${output.wording.booking.termsId}
- runFlow:
    when:
      platform: Android
    commands:
      - scrollUntilVisible:
          element: ${output.wording.booking.confirm}
- runFlow:
    when:
      platform: iOS
    commands:
      - scroll

- tapOn:
    text: ${output.wording.booking.confirm}
    retryTapIfNoChange: false

- assertVisible: ${output.wording.booking.confirmed}
- runFlow:
    when:
      platform: iOS
      visible: ${output.wording.common.later}
    commands:
      - tapOn: ${output.wording.common.later}

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: ${output.wording.booking.viewBooking}

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: ${output.wording.booking.viewBooking}

- scrollUntilVisible:
    element: ${output.wording.booking.cancel}
- tapOn: ${output.wording.booking.cancel}
- tapOn: ${output.wording.booking.cancel}
