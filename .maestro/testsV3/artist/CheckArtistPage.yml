appId: ${MAESTRO_APP_ID}
tags:
  - artist
onFlowStart:
  - runScript: ../common/DeepLink.js
---
- runFlow: ../common/LaunchApp.yml
- runFlow: ../common/StopApp.yml
- runFlow: ../common/DeepLinkToHome.yml

- runFlow: ../common/GoToSearchFromTabBar.yml

- tapOn: 'Catégorie Livres'
- tapOn: 'BD & comics'

- assertVisible: 'Rechercher'
- runFlow: ../common/SetEverywhere.yml
- extractTextWithAI:
    query: "Le nom exacte d'un artiste visible dans les résultats de recherche"
    outputVariable: 'artistName'
- tapOn: .*${artistName}.*
- assertVisible: 'Ses oeuvres populaires'
- scrollUntilVisible:
    element: 'Toutes ses offres disponibles'

- runFlow: ../common/StopApp.yml
