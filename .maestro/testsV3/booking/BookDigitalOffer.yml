appId: ${MAESTRO_APP_ID}
tags:
  - booking
onFlowStart:
  - runScript: ../common/deeplinks/DeepLink.js
  - runScript:
      file: ../common/helpers/generateUser.js
      env:
        id_provider: 'UBBLE'
        step: 'BENEFICIARY'
        age: 18
---
- runFlow: ../common/lifecycle/LaunchApp.yml
- runFlow: ../common/lifecycle/StopApp.yml
- runFlow: ../common/deeplinks/DeeplinkBeneficiaryUser.yml

- runFlow: ../common/navigation/GoToSearchFromTabBar.yml

- assertVisible: 'Rechercher'

- scrollUntilVisible:
    element:
      text: 'Catégorie Médias et presse'
- tapOn: 'Catégorie Médias et presse'

- tapOn: 'Voir tous les filtres : 1 filtre actif'
- tapOn: '.*Catégorie.*'

- assertVisible: 'Médias et presse'
- tapOn: '.*Presse en ligne.*'
- tapOn: 'Appliquer le filtre'

- tapOn: 'Rechercher'

- assertVisible: 'Rechercher'
- swipe:
    from:
      text: 'Les offres'
    direction: UP
- tapOn: 'Abonnement presse en ligne'

- runFlow:
    when:
      visible: "Réserver l’offre"
    commands:
      - tapOn: "Réserver l’offre"
      - assertVisible: 'Détails de la réservation'
      - tapOn: 'J’ai lu et j’accepte les conditions générales d’utilisation - obligatoire'
      - runFlow:
          when:
            platform: Android
          commands:
            - scrollUntilVisible:
                element: 'Confirmer la réservation'
      - runFlow:
          when:
            platform: iOS
          commands:
            - scroll

      - tapOn:
          text: '.*Confirmer la réservation.*'
          retryTapIfNoChange: false

      - assertVisible: "Réservation confirmée\_!"
      - runFlow:
          when:
            platform: iOS
            visible: 'Plus tard'
          commands:
            - tapOn: 'Plus tard'

      - tapOn: 'Voir ma réservation'

      - scrollUntilVisible:
          element: 'Annuler ma réservation'
      - tapOn: 'Annuler ma réservation'

      - runFlow:
          when:
            platform: Android
          commands:
            - tapOn: 'Annuler ma réservation'

      - runFlow: # iOS has an accessibility issue with the "Annuler ma réservation" button, so we need to tap on it with coordinates
          when:
            platform: iOS
          commands:
            - tapOn:
                point: 50%,87%

- runFlow:
    when:
      visible: "Accéder à l'offre en ligne"
    commands:
      - assertVisible: "Accéder à l'offre en ligne"

- runFlow:
    when:
      visible: 'Tu y es presque'
    commands:
      - assertVisible: 'Tu y es presque'

- runFlow: ../common/lifecycle/StopApp.yml
