appId: ${MAESTRO_APP_ID}
tags:
  - profile
onFlowStart:
  - runScript: ../common/DeepLink.js
---
- runFlow: ../common/LaunchApp.yml
- runFlow: ../common/StopApp.yml
- runFlow: ../common/DeeplinkToProfile.yml

- scrollUntilVisible:
    element:
      text: 'Notifications et thèmes suivis'

- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: 'Notifications et thèmes suivis'

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: 'Notifications et thèmes suivis'

- assertVisible:
    id: 'Autoriser les notifications - Interrupteur à bascule - non coché'
    enabled: false

- assertVisible:
    id: 'Autoriser les notifications - Interrupteur à bascule - non coché'
    enabled: false

- assertVisible:
    id: 'Suivre tous les thèmes - Interrupteur à bascule - non coché'
    enabled: false

- runFlow: ../common/StopApp.yml
