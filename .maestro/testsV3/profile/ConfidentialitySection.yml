appId: ${MAESTRO_APP_ID}
tags:
  - profile
onFlowStart:
  - runScript: ../common/DeepLink.js
  - runScript:
      file: ../common/generateUser.js
      env:
        id_provider: 'UBBLE'
        step: 'BENEFICIARY'
        age: 18
---
- runFlow: ../common/LaunchApp.yml
- runFlow: ../common/StopApp.yml
- runFlow: ../common/DeeplinkBeneficiaryUser.yml
- runFlow: ../common/GoToProfileFromTabBar.yml

- scrollUntilVisible:
    element:
      text: '.*Partage le pass Culture.*'
- tapOn:
    text: 'Confidentialité'

- assertVisible: 'Paramètres de confidentialité'
- tapOn:
    id: 'Tout accepter - Interrupteur à bascule - coché'
- scroll
- assertVisible: '.*politique de gestion des cookies'
- tapOn: 'Enregistrer mes choix'

- runFlow: ../common/StopApp.yml
