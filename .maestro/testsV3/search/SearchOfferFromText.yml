appId: ${MAESTRO_APP_ID}
tags:
  - search
  - fix
onFlowStart:
  - runScript: ../common/deeplinks/DeepLink.js
---
- runFlow: ../common/lifecycle/LaunchApp.yml
- runFlow: ../common/lifecycle/StopApp.yml
- runFlow: ../common/deeplinks/DeeplinkToHome.yml

- runFlow: ../common/navigation/GoToSearchFromTabBar.yml

- assertVisible: 'Rechercher'

- runFlow:
    when:
      visible: 'Ma position'
    commands:
      - tapOn: 'Ma position'
      - tapOn: 'Localisation – Liste - Élément 3 sur 3 - France entière.*'

- tapOn: 'Champs de texte - Rechercher dans le catalogue'

- inputText: 'One piece'
- pressKey: Enter

- tapOn:
    id: 'Voir tous les filtres'
- tapOn: '.*Prix.*'
- tapOn:
    id: 'Entrée pour le prix maximum'
- inputText: '50'
- pressKey: Enter
- tapOn: 'Appliquer le filtre'

- tapOn: '.*Accessibilité.*'

- tapOn: 'Appliquer le filtre'

- tapOn: 'Rechercher'

- swipe:
    from:
      text: 'Les offres'
    direction: UP

- extractTextWithAI:
    query: "Le titre exacte d'une des offres One Piece non-cropé visible dans les résultats de recherche"
    outputVariable: 'physicalOfferTitle'
- tapOn: .*${physicalOfferTitle}.*

- runFlow: ../common/lifecycle/StopApp.yml
