name: '4 [on_workflow] iOS deploy'

on:
  workflow_call:
    inputs:
      CACHE_BUCKET_NAME:
        type: string
        required: true
      ENV:
        type: string
        required: true
    secrets:
      GCP_EHP_SERVICE_ACCOUNT:
        required: true
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER:
        required: true

jobs:
  sentry_and_deploy:
    name: 'Install runtime environment and dependencies iOS deploy'
    runs-on: macos-26
    timeout-minutes: 60
    environment:
      name: app-native-${{ inputs.ENV }}
    steps:
      - name: Is deployment targeting ehp or production
        id: cloudenv
        env:
          ENV: ${{ inputs.ENV }}
        run: |
          if [ "$ENV" != "production" ]; then
            echo "cloud_env=ehp" >> "$GITHUB_OUTPUT"
          else
            echo "cloud_env=prod" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.3
      - name: Set up Cloud SDK to get gsutils
        uses: 'google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db' #v3.1.0
        with:
          version: '>= 416.0.0'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5715b432e91814bc6ab6725ff10abf3b81d5f8d1 # safe-chain-setup/v1.3.3
      - name: Setup yarn
        run: npm install -g yarn
      - name: Enable Corepack
        run: corepack enable
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        id: yarn-modules-cache
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: v1-yarn-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            v1-yarn-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Yarn install
        run: yarn install
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af #v1.313.0
        with:
          bundler-cache: true
      - name: Select XCode version
        run: |
          XCODE_VERSION="$(cat ./.xcode-version)"
          sudo xcode-select --switch "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
      - name: Install iOS runtime
        run: xcrun simctl list > /dev/null && xcodebuild -downloadPlatform iOS
      - name: Show available XCode's SDKs
        run: xcodebuild -showsdks
      - name: Install cocoapods
        run: cd ios/ && bundle exec pod install
      - name: Authentification to Google
        id: openid-auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
      - name: Get Secret from Secret Manager
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD:passculture-metier-ehp/passculture-app-native-ios-fastlane-password
            IOS_GOOGLE_SERVICES_PLIST:passculture-metier-${{ steps.cloudenv.outputs.cloud_env }}/pc-native-ios-google-service-${{ inputs.ENV }}
            MATCH_GIT_URL:passculture-metier-ehp/passculture-app-native-match-git-url
            MATCH_PASSWORD:passculture-metier-ehp/passculture-app-native-match-password
            MATCH_SSH_KEY:passculture-metier-ehp/passculture-app-native-match-ssh-key
            MATCH_USERNAME:passculture-metier-ehp/passculture-app-native-match-username
            SENTRY_AUTH_TOKEN:passculture-metier-ehp/pcapi-native-sentry-saas-token
      - name: 'Render Template'
        run: |
          cp templates_github_ci/.sentryclirc .sentryclirc
          sed '$d' .sentryclirc
          echo "token=${{ steps.secrets.outputs.SENTRY_AUTH_TOKEN }}" >> .sentryclirc
      - name: Setup iOS Google services config
        run: echo '${{ steps.secrets.outputs.IOS_GOOGLE_SERVICES_PLIST }}' > ios/GoogleService-Info.plist
      - name: Add ssh key needed
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 #v0.10.0
        with:
          ssh-private-key: ${{  steps.secrets.outputs.MATCH_SSH_KEY }}

      - name: Create service account key
        id: create-sa-key
        env:
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys create temporary-sa-key.json \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}"
          SA_KEY_ID=$(jq -r .private_key_id temporary-sa-key.json)
          echo "SA_KEY_ID=${SA_KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy hard ios for ${{ inputs.ENV }}
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ steps.secrets.outputs.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          MATCH_PASSWORD: ${{ steps.secrets.outputs.MATCH_PASSWORD }}
          MATCH_USERNAME: ${{ steps.secrets.outputs.MATCH_USERNAME }}
          MATCH_GIT_URL: ${{ steps.secrets.outputs.MATCH_GIT_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: temporary-sa-key.json
          ENV: ${{ inputs.ENV }}
        run: |
          if [ "${ENV}" != "production" ]; then
            bundle exec fastlane ios deploy firebase_token:"${GOOGLE_APPLICATION_CREDENTIALS}" --env "${ENV}" --verbose
          else
            bundle exec fastlane ios deploy --env "${ENV}" --verbose
          fi

      - name: Delete service account key
        if: always()
        env:
          KEY_ID: ${{ steps.create-sa-key.outputs.SA_KEY_ID }}
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys delete "${KEY_ID}" \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}" \
            --quiet
          rm -f temporary-sa-key.json

      - name: Create Sentry sourcemaps
        env:
          ENV: ${{ inputs.ENV }}
        run: source scripts/upload_sourcemaps_to_sentry.sh;upload_sourcemaps "ios" "$ENV"

  slack_notify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ always() && (contains(needs.sentry_and_deploy.result, 'success') || contains(needs.sentry_and_deploy.result, 'failure'))}}
    needs: sentry_and_deploy
    steps:
      - name: Connect to Secret Manager
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: Get secrets for Slack
        id: 'slack_secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            SLACK_BOT_TOKEN:passculture-metier-ehp/passculture-ci-slack-bot-token
      - name: Post to a Slack channel
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c #v3.0.3
        with:
          # channel #alertes-deploiement-native
          method: chat.postMessage
          token: ${{ steps.slack_secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            channel: 'C0309RP8K42'
            text: "Le déploiement iOS sur `${{ inputs.ENV }}` a ${{ fromJSON('["réussi :rocket:", "échoué :boom:"]')[(needs.sentry_and_deploy.result == 'failure') && 1 || 0] }}"
            attachments: [
              {
                "mrkdwn_in": ["text"],
                "color": "${{ fromJSON('["#36a64f", "#A30002"]')[(needs.sentry_and_deploy.result == 'failure') && 1 || 0] }}",
                "author_name": "${{github.actor}}",
                "author_link": "https://github.com/${{github.actor}}",
                "author_icon": "https://github.com/${{github.actor}}.png",
                "title": "PCAPPNATIVE Deployment",
                "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
              }
            ]
            unfurl_links: false
            unfurl_media: false
