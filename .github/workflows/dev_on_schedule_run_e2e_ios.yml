name: '[Nightly] Run E2E tests on iOS'

on:
  schedule:
    # 6:00 AM Paris time in UTC (Monday to Friday)
    - cron: '0 6 * * 1-5'

permissions:
  contents: read
  id-token: write

jobs:
  e2e-tests-ios:
    uses: ./.github/workflows/dev_on_workflow_call_e2e_ios.yml
    secrets:
      GCP_EHP_SERVICE_ACCOUNT: ${{ vars.APP_NATIVE_CI_SERVICE_ACCOUNT_EMAIL }}
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PRD }}
