name: '4 [on_workflow] Soft deploy'

on:
  workflow_call:
    inputs:
      CACHE_BUCKET_NAME:
        type: string
        required: true
      ENV:
        type: string
        required: true
    secrets:
      GCP_EHP_SERVICE_ACCOUNT:
        required: true
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER:
        required: true

jobs:
  sentry_and_deploy:
    name: 'Install runtime environment and dependencies Soft deploy'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment:
      name: app-native-${{ inputs.ENV }}
    steps:
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5715b432e91814bc6ab6725ff10abf3b81d5f8d1 # safe-chain-setup/v1.3.3
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 #v4.0.1
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        id: yarn-modules-cache
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: v1-yarn-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            v1-yarn-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
      - name: Yarn install
        run: yarn install
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f #v1.310.0
        with:
          bundler-cache: true
      - name: Authentification to Google
        id: openid-auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
      - name: Get Secret
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            ANDROID_APPCENTER_API_TOKEN:passculture-metier-ehp/passculture-app-native-android-${{ inputs.ENV }}-token
            IOS_APPCENTER_API_TOKEN:passculture-metier-ehp/passculture-app-native-ios-${{ inputs.ENV }}-token
            SENTRY_AUTH_TOKEN:passculture-metier-ehp/pcapi-native-sentry-saas-token

      - name: Render Sentry Template
        id: render_template
        uses: chuhlomin/render-template@a7c644e341797d050d1cb24332d83791b9a46dae #v1.10
        with:
          template: templates_github_ci/.sentryclirc
          vars: |
            token: ${{ steps.secrets.outputs.SENTRY_AUTH_TOKEN }}
          result_path: .sentryclirc

      - name: Create service account key
        id: create-sa-key
        env:
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys create temporary-sa-key.json \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}"
          SA_KEY_ID=$(jq -r .private_key_id temporary-sa-key.json)
          echo "SA_KEY_ID=${SA_KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy soft android for ${{ inputs.ENV }}
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          GOOGLE_APPLICATION_CREDENTIALS: temporary-sa-key.json
          ENV: ${{ inputs.ENV }}
        run: |
          bundle exec fastlane android deploy ota: --env "${ENV}"

      - name: Deploy soft ios App for ${{ inputs.ENV }}
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          GOOGLE_APPLICATION_CREDENTIALS: temporary-sa-key.json
          ENV: ${{ inputs.ENV }}
        run: |
          bundle exec fastlane ios deploy ota: --env "${ENV}"

      - name: Delete service account key
        if: always() && steps.create-sa-key.conclusion != 'skipped'
        env:
          KEY_ID: ${{ steps.create-sa-key.outputs.SA_KEY_ID }}
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys delete "${KEY_ID}" \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}" \
            --quiet
          rm -f temporary-sa-key.json

  slack_notify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ always() && (contains(needs.sentry_and_deploy.result, 'success') || contains(needs.sentry_and_deploy.result, 'failure'))}}
    needs: sentry_and_deploy
    steps:
      - name: Connect to Secret Manager
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: Get secrets for Slack
        id: 'slack_secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            SLACK_BOT_TOKEN:passculture-metier-ehp/passculture-ci-slack-bot-token
      - name: Post to a Slack channel
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c #v3.0.3
        with:
          # channel #alertes-deploiement-native
          method: chat.postMessage
          token: ${{ steps.slack_secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            channel: 'C0309RP8K42'
            text: "Le déploiement en OTA Android/iOS sur `${{ inputs.ENV }}` a ${{ fromJSON('["réussi :rocket:", "échoué :boom:"]')[(needs.sentry_and_deploy.result == 'failure') && 1 || 0] }}"
            attachments: [
              {
                "mrkdwn_in": ["text"],
                "color": "${{ fromJSON('["#36a64f", "#A30002"]')[(needs.sentry_and_deploy.result == 'failure') && 1 || 0] }}",
                "author_name": "${{github.actor}}",
                "author_link": "https://github.com/${{github.actor}}",
                "author_icon": "https://github.com/${{github.actor}}.png",
                "title": "PCAPPNATIVE Deployment",
                "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
              }
            ]
            unfurl_links: false
            unfurl_media: false
