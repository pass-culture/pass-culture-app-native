name: "Deploy PR version for validation in testing"


on:  
  pull_request:
    branches:
      - master

jobs:  
  deploy-validation-env:
    uses: ./.github/workflows/dev_on_workflow_pr_version_generic.yml
    secrets:
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
    with:
      ENV: testing
      CHANNEL: ""
      REF: "${{ github.ref }}"
