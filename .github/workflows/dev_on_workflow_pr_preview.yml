name: '2 [on_workflow/PR] Deploy PR version for validation'

on:
  workflow_call:
    inputs:
      ENV:
        type: string
        required: true
      PUSH_RELEASE_TO_SENTRY:
        description: 'If true, creates a release in Sentry and uploads sourcemaps'
        type: boolean
        default: false
      CHANNEL:
        type: string
        required: true
      EXPIRES:
        type: string
        default: '3d'
      REF:
        type: string
        required: true
      CACHE_BUCKET_NAME:
        type: string
        required: true

defaults:
  run:
    working-directory: '.'

jobs:
  deploy_on_firebase:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ github.actor != 'dependabot[bot]' }}
    environment:
      name: app-native-${{ inputs.ENV }}
    steps:
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.3
        with:
          ref: ${{ inputs.REF }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5715b432e91814bc6ab6725ff10abf3b81d5f8d1 # safe-chain-setup/v1.3.3
      - name: 'OpenID Connect Authentication'
        id: 'openid-auth'
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          export_environment_variables: true
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
      - name: 'Get Secret'
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            SENTRY_TOKEN:passculture-metier-ehp/pcapi-native-sentry-saas-token
      - name: 'Cache the node_modules'
        id: 'yarn-modules-cache'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          compression-method: 'gzip'
          path: |
            **/node_modules
          key: v1-yarn-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock', 'patches/**') }}
          restore-keys: |
            v1-yarn-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock', 'patches/**') }}
      - run: yarn install
      - run: yarn run "build:$ENV"
        env:
          # By default NodeJS processes are limited to 512MB of memory
          # This is not enough for the build process when compiling sourcemaps
          # Increases the limit so that the build doesnt fail
          NODE_OPTIONS: --max_old_space_size=4096
          ENV: ${{ inputs.ENV }}
      - if: inputs.ENV != 'testing'
        run: |
          grep -E '"version": "[0-9]+.[0-9]+.[0-9]+"' package.json | grep -Eo '[0-9]+.[0-9]+.[0-9]+' > build/version.txt
      - name: 'Create Sentry release'
        if: ${{ inputs.PUSH_RELEASE_TO_SENTRY }}
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 #v3.0.0
        env:
          SENTRY_AUTH_TOKEN: ${{ steps.secrets.outputs.SENTRY_TOKEN }}
          SENTRY_ORG: pass-culture
          SENTRY_PROJECT: jeunes
        with:
          sourcemaps: ./build
          working_directory: .
          version: ${{ inputs.CHANNEL }}
          url_prefix: '~'

      - name: Create service account key
        id: create-sa-key
        env:
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys create temporary-sa-key.json \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}"
          SA_KEY_JSON=$(jq -c . temporary-sa-key.json)
          echo "FIREBASE_TOKEN=${SA_KEY_JSON}" >> "${GITHUB_OUTPUT}"
          SA_KEY_ID=$(jq -r .private_key_id temporary-sa-key.json)
          echo "SA_KEY_ID=${SA_KEY_ID}" >> "${GITHUB_OUTPUT}"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c #v0.10.0
        id: firebase-deploy
        env:
          FIREBASE_TOKEN: ${{ steps.create-sa-key.outputs.FIREBASE_TOKEN }}
          PROJECT_ID: pc-native-${{ inputs.ENV }}
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ${FIREBASE_TOKEN}
          expires: ${{ inputs.EXPIRES }}
          projectId: pc-native-${{ inputs.ENV }}
          entryPoint: .
          channelId: ${{ inputs.CHANNEL }}

      - name: Delete service account key
        if: always()
        env:
          KEY_ID: ${{ steps.create-sa-key.outputs.SA_KEY_ID }}
          SERVICE_ACCOUNT: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ steps.openid-auth.outputs.project_id }}
        run: |
          gcloud iam service-accounts keys delete "${KEY_ID}" \
            --iam-account="${SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}" \
            --quiet
          rm -f temporary-sa-key.json

      - name: 'Firebase Deployment URL'
        run: |
          echo "::notice:: Firebase deployment is available at : ${{ steps.firebase-deploy.outputs.details_url }}"
