name: '2 [on_workflow/PR] Deploy PR version for validation'

on:
  workflow_call:
    inputs:
      ENV:
        description: 'Environment to deploy to (e.g., "testing")'
        type: string
        required: true
      SOURCE_BRANCH:
        description: 'Branch of pass-culture-app-native repository to deploy'
        type: string
        required: true
      PUSH_RELEASE_TO_SENTRY:
        description: 'If true, creates a release in Sentry and uploads sourcemaps'
        type: boolean
        default: false
      DURATION:
        description: 'Time to live for the preview deployment (e.g., "3d" for 3 days)'
        type: string
        default: '3d'
    secrets:
      PASSCULTURE_GITHUB_ACTION_APP_ID:
        description: 'The GitHub App ID for the PassCulture GitHub App'
        required: true
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY:
        description: 'The private key for the PassCulture GitHub App'
        required: true

defaults:
  run:
    working-directory: '.'

jobs:
  deploy_on_firebase:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read # checkout the PR ref
      id-token: write # OIDC token for google-github-actions/auth
    environment:
      name: app-native-${{ inputs.ENV }}
    steps:
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.3
        with:
          ref: ${{ inputs.SOURCE_BRANCH }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5715b432e91814bc6ab6725ff10abf3b81d5f8d1 # safe-chain-setup/v1.3.3

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: v0.7.2
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID}}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY}}

      - name: 'OpenID Connect Authentication'
        id: 'openid-auth'
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          export_environment_variables: true
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.NATIVE_DEPLOYER_SERVICE_ACCOUNT }}
      - name: 'Get Secret'
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            SENTRY_TOKEN:passculture-metier-ehp/pcapi-native-sentry-saas-token
      - name: 'Cache the node_modules'
        id: 'yarn-modules-cache'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          compression-method: 'gzip'
          path: |
            **/node_modules
          key: v1-yarn-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock', 'patches/**') }}
          restore-keys: |
            v1-yarn-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock', 'patches/**') }}
      - run: yarn install
      - run: yarn run "build:$ENV"
        env:
          # By default NodeJS processes are limited to 512MB of memory
          # This is not enough for the build process when compiling sourcemaps
          # Increases the limit so that the build doesnt fail
          NODE_OPTIONS: --max_old_space_size=4096
          ENV: ${{ inputs.ENV }}
      - if: inputs.ENV != 'testing'
        run: |
          grep -E '"version": "[0-9]+.[0-9]+.[0-9]+"' package.json | grep -Eo '[0-9]+.[0-9]+.[0-9]+' > build/version.txt
      - name: 'Create Sentry release'
        if: ${{ inputs.PUSH_RELEASE_TO_SENTRY }}
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a #v3.0.0
        env:
          SENTRY_AUTH_TOKEN: ${{ steps.secrets.outputs.SENTRY_TOKEN }}
          SENTRY_ORG: pass-culture
          SENTRY_PROJECT: jeunes
        with:
          sourcemaps: ./build
          working_directory: .
          version: ${{ inputs.SOURCE_BRANCH }}
          url_prefix: '~'

      - name: Deploy to Firebase Hosting
        env:
          CHANNEL: ${{ inputs.SOURCE_BRANCH }}
          PROJECT_ID: pc-native-${{ inputs.ENV }}
          TARGET: pc-native-${{ inputs.ENV }}
          DURATION: ${{ inputs.DURATION }}
        id: deploy
        run: |
          URL=$(passdirector firebase deploy-preview --project-id "${PROJECT_ID}" --target "${TARGET}" --channel "${CHANNEL}" --duration "${DURATION}")
          echo "preview_url=$URL" | tee -a "$GITHUB_OUTPUT"

      - name: Publish Summary
        run: |
          {
            echo "### :rocket: Deploy app native preview summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [preview] url                        |  ${{ steps.deploy.outputs.preview_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
