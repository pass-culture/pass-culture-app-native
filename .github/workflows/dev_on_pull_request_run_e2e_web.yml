name: 'E2E Web SmokeTest'

on:
  push:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  run_e2e_web:
    name: 'Smoke test Staging Web'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Authentification to Google
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}

      - name: Get secrets for Maestro
        id: maestro_secrets
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 #v3.0.0
        with:
          secrets: |-
            ROBIN_API_KEY:passculture-metier-ehp/passculture-app-native-e2e-robin-api-key
            MAESTRO_PASSWORD:passculture-metier-ehp/passculture-app-native-e2e-maestro-password
            MAESTRO_CLOUD_API_KEY:passculture-metier-ehp/passculture-app-native-e2e-maestro-cloud-api-key
            MAESTRO_E2E_API_KEY:passculture-metier-ehp/pcapi-staging_e2e_api_key
            MAESTRO_E2E_ENDPOINT:passculture-metier-ehp/pcapi-staging-e2e-endpoint

      - name: Generate Maestro Web upload name
        id: generate_name
        run: |
          DATE="$(date +"%d/%m/%Y")"
          COMMIT_HASH="$(git rev-parse --short=8 HEAD)"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            CUSTOM_NAME="[Nightly][Web] Release du ${DATE} au soir (${COMMIT_HASH})"
          else
            CUSTOM_NAME="[Web] Staging du ${DATE} (${COMMIT_HASH})"
          fi
          echo "CUSTOM_NAME=$CUSTOM_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload and run web tests with Maestro Cloud
        uses: mobile-dev-inc/action-maestro-cloud@v3.0.1
        with:
          api-key: ${{ steps.maestro_secrets.outputs.ROBIN_API_KEY }}
          project-id: proj_01javz1ncreqb9dcshv3y4da44
          name: ${{ steps.generate_name.outputs.CUSTOM_NAME }}
          device-os: web
          device-locale: fr_FR
          workspace: .maestro/testsV3/
          include-tags: web
          async: true
          env: |
            MAESTRO_PASSWORD=${{ steps.maestro_secrets.outputs.MAESTRO_PASSWORD }}
            MAESTRO_VALID_IOS_EMAIL=dev-tests-e2e-ios@passculture.team
            MAESTRO_VALID_ANDROID_EMAIL=dev-tests-e2e-android@passculture.team
            MAESTRO_INVALID_EMAIL=dev-tests-e2e-invalid@passculture.team
            MAESTRO_UNREGISTERED_EMAIL=dev-tests-unregistered+e2e@passculture.team
            MAESTRO_RUN_TRACKING_TESTS=false
            MAESTRO_RUN_CLOUD_COMMANDS=true
            MAESTRO_CLOUD_API_KEY=${{ steps.maestro_secrets.outputs.MAESTRO_CLOUD_API_KEY }}
            MAESTRO_E2E_API_KEY=${{ steps.maestro_secrets.outputs.MAESTRO_E2E_API_KEY }}
            MAESTRO_E2E_ENDPOINT=${{ steps.maestro_secrets.outputs.MAESTRO_E2E_ENDPOINT }}

  slack_notify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always()
    needs: run_e2e_web
    steps:
      - name: Connect to Secret Manager
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: Get secrets for Slack
        id: 'slack_secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' #v3.0.0
        with:
          secrets: |-
            SLACK_BOT_TOKEN:passculture-metier-ehp/passculture-ci-slack-bot-token
      - name: Post to a Slack channel
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c #v3.0.3
        with:
          # channel #equipe-e2e-jeunes
          method: chat.postMessage
          token: ${{ steps.slack_secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            channel: 'C05MH81G9LY'
            text: "Le smoke test Web sur la branche `${{ github.ref_name }}` a ${{ fromJSON('["réussi :rocket:", "échoué :boom:"]')[(needs.run_e2e_web.result == 'failure') && 1 || 0] }}"
            attachments: [
                  {
                      "mrkdwn_in": ["text"],
                      "color": "${{ fromJSON('["#36a64f", "#A30002"]')[(needs.run_e2e_web.result == 'failure') && 1 || 0] }}",
                      "author_name": "${{github.actor}}",
                      "author_link": "https://github.com/${{github.actor}}",
                      "author_icon": "https://github.com/${{github.actor}}.png",
                      "title": "SMOKETEST E2E-WEB",
                      "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
                  }
            ]
            unfurl_links: false
            unfurl_media: false
